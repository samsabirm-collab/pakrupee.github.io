<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <!-- Rose Gold Metallic -->
    <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7d4c4"/>
      <stop offset="30%" stop-color="#e8b8a8"/>
      <stop offset="60%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#a07850"/>
    </linearGradient>

    <!-- Emerald Green -->
    <linearGradient id="eg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="50%" stop-color="#00a651"/>
      <stop offset="100%" stop-color="#005530"/>
    </linearGradient>

    <!-- Royal Blue -->
    <linearGradient id="rb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4169e1"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>

    <!-- Diamond White -->
    <radialGradient id="dw" cx="30%" cy="30%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </radialGradient>

    <!-- Shadow -->
    <filter id="sh">
      <feDropShadow dx="0.3" dy="0.3" stdDeviation="0.4" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Coin edge shadow -->
  <circle cx="16" cy="16.4" r="15.7" fill="#3a2510"/>

  <!-- Main coin body - ROSE GOLD -->
  <circle cx="16" cy="16" r="15.5" fill="url(#rg)" filter="url(#sh)"/>

  <!-- BRAIDED BORDER - Green segments -->
  <circle cx="16" cy="16" r="14.6" fill="none" stroke="url(#eg)" stroke-width="1.6" stroke-dasharray="2.8,2.8"/>

  <!-- BRAIDED BORDER - Blue segments (offset) -->
  <circle cx="16" cy="16" r="14.6" fill="none" stroke="url(#rb)" stroke-width="1.6" stroke-dasharray="2.8,2.8" stroke-dashoffset="2.8"/>

  <!-- Inner polished ring -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#d4a574" stroke-width="0.7"/>
  <circle cx="16" cy="16" r="11.4" fill="#c9956a" opacity="0.2"/>

  <!-- CENTER FIELD -->
  <circle cx="16" cy="14" r="8" fill="url(#rg)"/>

  <!-- CRESCENT MOON - Pakistan style -->
  <path d="M12.5 6
           C8.5 7.5 7 11 7 14
           C7 17.5 8.5 20.5 12.5 22
           C10 20 9 17 9 14
           C9 11 10 8 12.5 6Z"
        fill="url(#eg)"/>

  <!-- Green emeralds on crescent inner curve -->
  <circle cx="9.5" cy="9.5" r="0.55" fill="url(#eg)"/>
  <circle cx="8.8" cy="11.5" r="0.55" fill="url(#eg)"/>
  <circle cx="8.5" cy="14" r="0.55" fill="url(#eg)"/>
  <circle cx="8.8" cy="16.5" r="0.55" fill="url(#eg)"/>
  <circle cx="9.5" cy="18.5" r="0.55" fill="url(#eg)"/>

  <!-- White diamonds on crescent outer curve -->
  <circle cx="11.5" cy="7.5" r="0.4" fill="url(#dw)"/>
  <circle cx="10.5" cy="9" r="0.35" fill="url(#dw)"/>
  <circle cx="10" cy="19" r="0.35" fill="url(#dw)"/>
  <circle cx="11" cy="20.5" r="0.4" fill="url(#dw)"/>

  <!-- FIVE-POINTED STAR -->
  <polygon points="19,7 20,10.5 23.5,10.5 20.7,12.8 21.7,16.2 19,14 16.3,16.2 17.3,12.8 14.5,10.5 18,10.5"
           fill="url(#eg)"/>

  <!-- Star center emerald -->
  <circle cx="19" cy="11.5" r="0.7" fill="url(#eg)"/>

  <!-- Star point diamonds -->
  <circle cx="19" cy="7.2" r="0.35" fill="url(#dw)"/>
  <circle cx="20" cy="10.5" r="0.3" fill="url(#dw)"/>
  <circle cx="23.3" cy="10.5" r="0.3" fill="url(#dw)"/>
  <circle cx="21.5" cy="16" r="0.3" fill="url(#dw)"/>
  <circle cx="16.5" cy="16" r="0.3" fill="url(#dw)"/>

  <!-- PKRT TEXT - ENGRAVED STYLE (correctly spelled!) -->
  <text x="16" y="26.5"
        font-family="Georgia, serif"
        font-size="5"
        font-weight="700"
        fill="#2a1a0a"
        text-anchor="middle"
        letter-spacing="1">PKRT</text>

  <!-- Top highlight shine -->
  <ellipse cx="11" cy="9" rx="5" ry="2.5" fill="white" opacity="0.1"/>

  <!-- Rim highlight -->
  <path d="M6 10 Q6 4 16 4 Q26 4 26 10" fill="none" stroke="white" stroke-width="0.5" opacity="0.15"/>
</svg>