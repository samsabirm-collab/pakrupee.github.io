<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <!-- Rose Gold Gradient -->
    <linearGradient id="roseGold2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7d0c4"/>
      <stop offset="25%" stop-color="#e8b4a0"/>
      <stop offset="50%" stop-color="#d4a574"/>
      <stop offset="75%" stop-color="#c9956a"/>
      <stop offset="100%" stop-color="#a67c52"/>
    </linearGradient>

    <!-- Emerald Green -->
    <linearGradient id="emerald2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#006633"/>
    </linearGradient>

    <!-- Royal Blue -->
    <linearGradient id="royalBlue2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4169e1"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>

    <!-- Diamond -->
    <radialGradient id="diamond2" cx="30%" cy="30%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </radialGradient>

    <!-- Shadow -->
    <filter id="shadow2">
      <feDropShadow dx="0.3" dy="0.3" stdDeviation="0.4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- OUTER EDGE -->
  <circle cx="16" cy="16.3" r="15.8" fill="#5a4020"/>

  <!-- MAIN COIN -->
  <circle cx="16" cy="16" r="15.5" fill="url(#roseGold2)" filter="url(#shadow2)"/>

  <!-- BRAIDED BORDER - Green -->
  <circle cx="16" cy="16" r="14.5" fill="none" stroke="url(#emerald2)" stroke-width="1.4" stroke-dasharray="3,3"/>

  <!-- BRAIDED BORDER - Blue (offset) -->
  <circle cx="16" cy="16" r="14.5" fill="none" stroke="url(#royalBlue2)" stroke-width="1.4" stroke-dasharray="3,3" stroke-dashoffset="3"/>

  <!-- Inner ring -->
  <circle cx="16" cy="16" r="11.5" fill="none" stroke="#c9956a" stroke-width="0.6"/>

  <!-- SMALL CRESCENT & STAR (top) -->
  <g transform="translate(16, 8) scale(0.5)">
    <!-- Crescent -->
    <path d="M0 -4 C-4 -2 -5 2 -5 4 C-5 7 -3 9 0 10 C-2 8 -3 6 -3 4 C-3 2 -2 -1 0 -4Z"
          fill="url(#emerald2)"/>
    <!-- Star -->
    <polygon points="4,-2 5,0 7,0 5.5,1.5 6,3.5 4,2 2,3.5 2.5,1.5 1,0 3,0"
             fill="url(#emerald2)"/>
    <!-- Diamond accents -->
    <circle cx="-2" cy="-1" r="0.6" fill="url(#diamond2)"/>
    <circle cx="4" cy="0.5" r="0.5" fill="url(#diamond2)"/>
  </g>

  <!-- P CRYPTO SYMBOL (Bitcoin-style with two lines) -->
  <g transform="translate(16, 18)">
    <!-- The P letter -->
    <path d="M-4 -9 L-4 5 L-1.5 5 L-1.5 -1 L2.5 -1 C6 -1 6 -9 2.5 -9 Z M-1.5 -6.5 L2.5 -6.5 C4 -6.5 4 -3.5 2.5 -3.5 L-1.5 -3.5 Z"
          fill="#2d1810" filter="url(#shadow2)"/>
    <!-- First vertical line (left) -->
    <rect x="-5.5" y="-9" width="0.9" height="15" fill="#2d1810" rx="0.3"/>
    <!-- Second vertical line (right) -->
    <rect x="-3.8" y="-9" width="0.9" height="15" fill="#2d1810" rx="0.3"/>
  </g>

  <!-- HIGHLIGHTS -->
  <ellipse cx="11" cy="9" rx="5" ry="3" fill="white" opacity="0.12"/>
  <circle cx="16" cy="16" r="14" fill="none" stroke="white" stroke-width="0.4" opacity="0.1"/>
</svg>